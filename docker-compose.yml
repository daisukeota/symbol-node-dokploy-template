version: '3.8'

services:
  # 1. 初期化コンテナ
  initializer:
    build: ./initializer
    volumes:
      - symbol_config_v1:/app/target
    environment:
      - SYMBOL_NETWORK=${SYMBOL_NETWORK:-mainnet}
      - NODE_NAME=${NODE_NAME:-MyDokployNode}
      - DOMAIN_NAME=${DOMAIN_NAME}
      - MAIN_PRIVATE_KEY=${MAIN_PRIVATE_KEY}
      - VRF_PRIVATE_KEY=${VRF_PRIVATE_KEY}
      - REMOTE_PRIVATE_KEY=${REMOTE_PRIVATE_KEY}
      - VOTING_PRIVATE_KEY=${VOTING_PRIVATE_KEY}
    networks:
      - dokploy-network

  # 2. MongoDB
  db:
    image: mongo:7.0.23
    command: mongod --replSet rs0 --bind_ip_all
    volumes:
      - mongodb_data_v1:/data/db
    restart: always
    networks:
      - dokploy-network

  # 3. MongoDB レプリカセット初期化タスク
  mongo-init:
    image: mongo:7.0.23
    user: root
    depends_on:
      - db
    volumes:
      - symbol_config_v1:/symbol:ro
    # 👇 起動時に /startup のリンクを張ってから実行
    command: /bin/bash -c "ln -s /symbol/startup /startup && exec /bin/bash /startup/mongors.sh"
    networks:
      - dokploy-network

  # 4. Symbol Broker
  broker:
    image: symbolplatform/symbol-server:gcc-1.0.3.9
    user: root
    depends_on:
      - initializer
      - db
    volumes:
      - symbol_config_v1:/symbol:ro
      - symbol_data_v1:/data
    # 👇 起動時に /startup と /userconfig のリンクを張ってから実行
    command: /bin/bash -c "ln -s /symbol/startup /startup && ln -s /symbol/userconfig /userconfig && exec /bin/bash /startup/startBroker.sh /userconfig"
    restart: always
    networks:
      - dokploy-network

  # 5. Symbol ノード本体
  node:
    image: symbolplatform/symbol-server:gcc-1.0.3.9
    user: root
    depends_on:
      - initializer
      - broker
    volumes:
      - symbol_config_v1:/symbol:ro
      - symbol_data_v1:/data
    ports:
      - "7900:7900"
    # 👇 起動時に /startup と /userconfig のリンクを張ってから実行
    command: /bin/bash -c "ln -s /symbol/startup /startup && ln -s /symbol/userconfig /userconfig && exec /bin/bash /startup/startServer.sh /userconfig"
    restart: always
    networks:
      - dokploy-network

  # 6. REST ゲートウェイ
  rest-gateway:
    image: symbolplatform/symbol-rest:2.5.1
    user: root
    depends_on:
      - node
      - db
    volumes:
      - symbol_config_v1:/symbol:ro
    ports:
      - "3000:3000"
    # 👇 起動時に /startup と /userconfig のリンクを張ってから実行
    command: /bin/bash -c "ln -s /symbol/startup /startup && ln -s /symbol/userconfig /userconfig && exec /bin/bash /startup/delayrestapi.sh /userconfig"
    restart: always
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true

volumes:
  symbol_config_v1:
  symbol_data_v1:
  mongodb_data_v1: