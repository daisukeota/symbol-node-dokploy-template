services:
  # 1. 初期化コンテナ
  initializer:
    build: ./initializer
    volumes:
      - symbol_startup_v8:/app/dest_startup
      - symbol_userconfig_v8:/app/dest_userconfig
      - symbol_mongo_v8:/app/dest_mongo
      - symbol_seed_v8:/app/dest_seed
      - symbol_certificates_v8:/app/dest_certificates
    environment:
      - SYMBOL_NETWORK=${SYMBOL_NETWORK:-mainnet}
      - NODE_NAME=${NODE_NAME:-MyDokployNode}
      - DOMAIN_NAME=${DOMAIN_NAME}
      - MAIN_PRIVATE_KEY=${MAIN_PRIVATE_KEY}
      - VRF_PRIVATE_KEY=${VRF_PRIVATE_KEY}
      - REMOTE_PRIVATE_KEY=${REMOTE_PRIVATE_KEY}
      - VOTING_PRIVATE_KEY=${VOTING_PRIVATE_KEY}
    networks:
      - dokploy-network

  # 2. MongoDB
  mongo:
    image: mongo:7.0.23
    command: mongod --replSet rs0 --bind_ip_all
    volumes:
      - mongodb_data_v8:/data/db
    restart: always
    networks:
      - dokploy-network

  # 3. MongoDB レプリカセット初期化タスク
  mongo-init:
    image: mongo:7.0.23
    user: root
    depends_on:
      - mongo
    volumes:
      - symbol_startup_v8:/startup:ro
    network_mode: "service:mongo"
    command:
      - /bin/bash
      - -ec
      - |
        echo "=== MongoDB ReplicaSet Initialization Task ==="
        echo "1. Waiting for MongoDB to become responsive..."
        until mongosh --eval "db.runCommand({ping:1})" --quiet > /dev/null 2>&1; do
          echo "Waiting for MongoDB to be fully ready..."
          sleep 2
        done
        echo "MongoDB is officially responsive!"

        echo "2. Enforcing ReplicaSet Initiation directly via native mongosh..."
        mongosh --eval "
          try {
            var status = rs.status();
            print('ReplicaSet already initiated: ' + status.set);
          } catch (e) {
            print('Initiating ReplicaSet with host: mongo...');
            var res = rs.initiate({
              _id: 'rs0',
              members: [{ _id: 0, host: 'mongo:27017' }]
            });
            print('Result: ' + JSON.stringify(res));
          }
        " --quiet

        echo "3. Verifying ReplicaSet Status..."
        sleep 2
        mongosh --eval "rs.status()" --quiet || echo "Warning: Failed to get rs.status()"
        echo "=== MongoDB ReplicaSet Initialization Task Completed ==="

  # 4. Symbol Broker（承認エンジン）
  broker:
    image: symbolplatform/symbol-server:gcc-1.0.3.9
    user: root
    depends_on:
      - initializer
      - mongo
    volumes:
      - symbol_startup_v8:/startup:ro
      - symbol_userconfig_v8:/userconfig:ro
      - symbol_seed_v8:/seed:ro
      - symbol_certificates_v8:/certificates:ro
      - symbol_data_broker_v8:/data
    command: /bin/bash -c "umask 077 && mkdir -p /data/startup && touch /data/startup/datadir-initialized && rm -f /data/*.lock && exec /bin/bash /startup/startBroker.sh /userconfig"
    restart: always
    stop_signal: SIGINT
    networks:
      - dokploy-network

  # 5. Symbol ノード本体
  node:
    image: symbolplatform/symbol-server:gcc-1.0.3.9
    user: root
    depends_on:
      - initializer
      - broker
    volumes:
      - symbol_startup_v8:/startup:ro
      - symbol_userconfig_v8:/userconfig:ro
      - symbol_seed_v8:/seed:ro
      - symbol_certificates_v8:/certificates:ro
      - symbol_data_node_v8:/data
    ports:
      - "7900:7900"
    command: /bin/bash -c "umask 077 && mkdir -p /data/startup && touch /data/startup/mongo-initialized && rm -f /data/*.lock && exec /bin/bash /startup/startServer.sh /userconfig"
    restart: always
    stop_signal: SIGINT
    networks:
      - dokploy-network

  # 6. REST ゲートウェイ
  rest-gateway:
    image: symbolplatform/symbol-rest:2.5.1
    user: root
    depends_on:
      - node
      - mongo
    volumes:
      - symbol_startup_v8:/startup:ro
      - symbol_userconfig_v8:/userconfig:ro
    ports:
      - "3000:3000"
    command: /bin/bash /startup/delayrestapi.sh /userconfig
    restart: always
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true

volumes:
  symbol_startup_v8:
  symbol_userconfig_v8:
  symbol_mongo_v8:
  symbol_seed_v8:
  symbol_certificates_v8:
  symbol_data_broker_v8:
  symbol_data_node_v8:
  mongodb_data_v8: