services:
  # 1. 初期化コンテナ
  initializer:
    build: ./initializer
    volumes:
      - symbol_startup_v6:/app/dest_startup
      - symbol_userconfig_v6:/app/dest_userconfig
      - symbol_mongo_v6:/app/dest_mongo
      - symbol_seed_v6:/app/dest_seed
    environment:
      - SYMBOL_NETWORK=${SYMBOL_NETWORK:-mainnet}
      - NODE_NAME=${NODE_NAME:-MyDokployNode}
      - DOMAIN_NAME=${DOMAIN_NAME}
      - MAIN_PRIVATE_KEY=${MAIN_PRIVATE_KEY}
      - VRF_PRIVATE_KEY=${VRF_PRIVATE_KEY}
      - REMOTE_PRIVATE_KEY=${REMOTE_PRIVATE_KEY}
      - VOTING_PRIVATE_KEY=${VOTING_PRIVATE_KEY}
    networks:
      - dokploy-network

  # 2. MongoDB
  mongo:
    image: mongo:7.0.23
    command: mongod --replSet rs0 --bind_ip_all
    volumes:
      - mongodb_data_v6:/data/db
    restart: always
    networks:
      - dokploy-network

  # 3. MongoDB レプリカセット初期化タスク
  mongo-init:
    image: mongo:7.0.23
    user: root
    depends_on:
      - mongo
    volumes:
      - symbol_startup_v6:/startup:ro
    network_mode: "service:mongo"
    # 👇【ここを劇的に強化！】トリッキーな entrypoint を廃止し、配列とヒアドキュメントで確実にbashを点火します
    command:
      - /bin/bash
      - -c
      - |
        echo "Starting MongoDB readiness check loop..."
        until mongosh --eval "db.runCommand({ping:1})" --quiet > /dev/null 2>&1; do
          echo "Waiting for MongoDB to be fully ready..."
          sleep 2
        done
        echo "MongoDB is officially UP! Executing replication setup script..."
        /bin/bash /startup/mongors.sh
        echo "MongoDB ReplicaSet initialization successfully completed."

  # 4. Symbol Broker（承認エンジン）
  broker:
    image: symbolplatform/symbol-server:gcc-1.0.3.9
    user: root
    entrypoint: ["/bin/bash", "-c"]
    depends_on:
      - initializer
      - mongo
    volumes:
      - symbol_startup_v6:/startup:ro
      - symbol_userconfig_v6:/userconfig:ro
      - symbol_seed_v6:/seed:ro
      - symbol_data_v6:/data
    command: "/bin/bash /startup/startBroker.sh /userconfig"
    restart: always
    stop_signal: SIGINT
    networks:
      - dokploy-network

  # 5. Symbol ノード本体
  node:
    image: symbolplatform/symbol-server:gcc-1.0.3.9
    user: root
    entrypoint: ["/bin/bash", "-c"]
    depends_on:
      - initializer
      - broker
    volumes:
      - symbol_startup_v6:/startup:ro
      - symbol_userconfig_v6:/userconfig:ro
      - symbol_seed_v6:/seed:ro
      - symbol_data_v6:/data
    ports:
      - "7900:7900"
    command: "/bin/bash /startup/startServer.sh /userconfig"
    restart: always
    stop_signal: SIGINT
    networks:
      - dokploy-network

  # 6. REST ゲートウェイ
  rest-gateway:
    image: symbolplatform/symbol-rest:2.5.1
    user: root
    entrypoint: ["/bin/bash", "-c"]
    depends_on:
      - node
      - mongo
    volumes:
      - symbol_startup_v6:/startup:ro
      - symbol_userconfig_v6:/userconfig:ro
    ports:
      - "3000:3000"
    command: "/bin/bash /startup/delayrestapi.sh /userconfig"
    restart: always
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true

volumes:
  symbol_startup_v6:
  symbol_userconfig_v6:
  symbol_mongo_v6:
  symbol_seed_v6:
  symbol_data_v6:
  mongodb_data_v6: