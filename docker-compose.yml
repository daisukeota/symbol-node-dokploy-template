services:
  # 1. 初期化コンテナ (Shoestringによる設定ファイル自動生成)
  initializer:
    build: ./initializer
    volumes:
      - symbol_startup:/app/dest_startup
      - symbol_userconfig:/app/dest_userconfig
      - symbol_mongo:/app/dest_mongo
      - symbol_seed:/app/dest_seed
      - symbol_certificates:/app/dest_certificates
    environment:
      - SYMBOL_NETWORK=${SYMBOL_NETWORK:-mainnet}
      - NODE_NAME=${NODE_NAME:-MyDokployNode}
      - DOMAIN_NAME=${DOMAIN_NAME}
      - MAIN_PRIVATE_KEY=${MAIN_PRIVATE_KEY}
      - VRF_PRIVATE_KEY=${VRF_PRIVATE_KEY}
      - REMOTE_PRIVATE_KEY=${REMOTE_PRIVATE_KEY}
      - VOTING_PRIVATE_KEY=${VOTING_PRIVATE_KEY}
    networks:
      - dokploy-network

  # 2. データベース (MongoDB 本体)
  mongo:
    image: mongo:7.0.23
    command: mongod --replSet rs0 --bind_ip_all
    volumes:
      - mongodb_data:/data/db
    restart: always
    networks:
      - dokploy-network

  # 3. MongoDB レプリカセット初期化タスク
  # ※ MongoDB本体が完全にオンラインになるのを待ってから、安全にレプリカセット(rs0)を構成します
  mongo-init:
    image: mongo:7.0.23
    user: root
    depends_on:
      - mongo
    volumes:
      - symbol_startup:/startup:ro
    network_mode: "service:mongo" # mongo本体のネットワークに相乗りして直接コマンドを注入
    command:
      - /bin/bash
      - -ec
      - |
        echo "=== MongoDB ReplicaSet Initialization Task ==="
        until mongosh --eval "db.runCommand({ping:1})" --quiet > /dev/null 2>&1; do
          echo "Waiting for MongoDB to be fully ready..."
          sleep 2
        done
        mongosh --eval "
          try {
            var status = rs.status();
            print('ReplicaSet already initiated: ' + status.set);
          } catch (e) {
            print('Initiating ReplicaSet with host: mongo...');
            var res = rs.initiate({
              _id: 'rs0',
              members: [{ _id: 0, host: 'mongo:27017' }]
            });
            print('Result: ' + JSON.stringify(res));
          }
        " --quiet
        sleep 2
        mongosh --eval "rs.status()" --quiet || echo "Warning: Failed to get rs.status()"

  # 4. Symbol Broker（承認エンジン）
  broker:
    image: symbolplatform/symbol-server:gcc-1.0.3.9
    user: root
    depends_on:
      - initializer
      - mongo
    volumes:
      - symbol_startup:/startup:ro
      - symbol_userconfig:/userconfig:ro
      - symbol_seed:/seed:ro
      - symbol_certificates:/certificates:ro
      - symbol_data_broker:/data
    # 💡 処理の解説:
    # 1. umask 077: 公式推奨の堅牢なファイル権限に制限
    # 2. mkdir & touch: 公式スクリプトが初回起動時に存在しないファイルを rm しようとしてクラッシュするバグを先回りで防止
    # 3. rm -f *.lock: 異常終了時に残って再起動を阻害する古いロックファイルを自動パージ
    command: /bin/bash -c "umask 077 && mkdir -p /data/startup && touch /data/startup/datadir-initialized && rm -f /data/*.lock && exec /bin/bash /startup/startBroker.sh /userconfig"
    restart: always
    stop_signal: SIGINT
    networks:
      - dokploy-network

  # 5. Symbol ノード本体 (Peerサーバー)
  node:
    image: symbolplatform/symbol-server:gcc-1.0.3.9
    user: root
    depends_on:
      - initializer
      - broker
    volumes:
      - symbol_startup:/startup:ro
      - symbol_userconfig:/userconfig:ro
      - symbol_seed:/seed:ro
      - symbol_certificates:/certificates:ro
      - symbol_data_node:/data # ※ ロック競合を防ぐため、brokerとは完全に独立した個別ボリュームを割り当て
    ports:
      - "7900:7900"
    command: /bin/bash -c "umask 077 && mkdir -p /data/startup && touch /data/startup/mongo-initialized && rm -f /data/*.lock && exec /bin/bash /startup/startServer.sh /userconfig"
    restart: always
    stop_signal: SIGINT
    networks:
      - dokploy-network

  # 6. REST ゲートウェイ (API 外部公開用)
  rest-gateway:
    image: symbolplatform/symbol-rest:2.5.1
    user: root
    depends_on:
      - node
      - mongo
    volumes:
      - symbol_startup:/startup:ro
      - symbol_userconfig:/userconfig:ro
    ports:
      - "3000:3000"
    command: /bin/bash /startup/delayrestapi.sh /userconfig
    restart: always
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true

volumes:
  symbol_startup:
  symbol_userconfig:
  symbol_mongo:
  symbol_seed:
  symbol_certificates:
  symbol_data_broker:
  symbol_data_node:
  mongodb_data: