version: '3.8'

services:
  # 1. 初期化コンテナ
  initializer:
    build: ./initializer
    volumes:
      - symbol_startup_v4:/app/dest_startup
      - symbol_userconfig_v4:/app/dest_userconfig
      - symbol_mongo_v4:/app/dest_mongo
      - symbol_seed_v4:/app/dest_seed # 👈 追加
    environment:
      - SYMBOL_NETWORK=${SYMBOL_NETWORK:-mainnet}
      - NODE_NAME=${NODE_NAME:-MyDokployNode}
      - DOMAIN_NAME=${DOMAIN_NAME}
      - MAIN_PRIVATE_KEY=${MAIN_PRIVATE_KEY}
      - VRF_PRIVATE_KEY=${VRF_PRIVATE_KEY}
      - REMOTE_PRIVATE_KEY=${REMOTE_PRIVATE_KEY}
      - VOTING_PRIVATE_KEY=${VOTING_PRIVATE_KEY}
    networks:
      - dokploy-network

  # 2. MongoDB
  db:
    image: mongo:7.0.23
    command: mongod --replSet rs0 --bind_ip_all
    volumes:
      - mongodb_data_v4:/data/db
    restart: always
    networks:
      - dokploy-network

  # 3. MongoDB レプリカセット初期化タスク
  mongo-init:
    image: mongo:7.0.23
    user: root
    entrypoint: ["/bin/bash", "-c"]
    depends_on:
      - db
    volumes:
      - symbol_startup_v4:/startup:ro
    command: "/bin/bash /startup/mongors.sh"
    networks:
      - dokploy-network

  # 4. Symbol Broker（承認エンジン）
  broker:
    image: symbolplatform/symbol-server:gcc-1.0.3.9
    user: root
    entrypoint: ["/bin/bash", "-c"]
    depends_on:
      - initializer
      - db
    volumes:
      - symbol_startup_v4:/startup:ro
      - symbol_userconfig_v4:/userconfig:ro
      - symbol_seed_v4:/seed:ro # 👈 追加
      - symbol_data_v4:/data
    command: "/bin/bash /startup/startBroker.sh /userconfig"
    restart: always
    stop_signal: SIGINT
    networks:
      - dokploy-network

  # 5. Symbol ノード本体
  node:
    image: symbolplatform/symbol-server:gcc-1.0.3.9
    user: root
    entrypoint: ["/bin/bash", "-c"]
    depends_on:
      - initializer
      - broker
    volumes:
      - symbol_startup_v4:/startup:ro
      - symbol_userconfig_v4:/userconfig:ro
      - symbol_seed_v4:/seed:ro # 👈 追加
      - symbol_data_v4:/data
    ports:
      - "7900:7900"
    command: "/bin/bash /startup/startServer.sh /userconfig"
    restart: always
    stop_signal: SIGINT
    networks:
      - dokploy-network

  # 6. REST ゲートウェイ
  rest-gateway:
    image: symbolplatform/symbol-rest:2.5.1
    user: root
    entrypoint: ["/bin/bash", "-c"]
    depends_on:
      - node
      - db
    volumes:
      - symbol_startup_v4:/startup:ro
      - symbol_userconfig_v4:/userconfig:ro
    ports:
      - "3000:3000"
    command: "/bin/bash /startup/delayrestapi.sh /userconfig"
    restart: always
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true

volumes:
  symbol_startup_v4:
  symbol_userconfig_v4:
  symbol_mongo_v4:
  symbol_seed_v4:
  symbol_data_v4:
  mongodb_data_v4: