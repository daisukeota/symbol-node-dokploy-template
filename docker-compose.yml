services:
  # 1. 初期化タスク
  initializer:
    build: ./initializer
    volumes:
      - symbol_startup:/app/dest_startup
      - symbol_userconfig:/app/dest_userconfig
      - symbol_mongo:/app/dest_mongo
      - symbol_seed:/app/dest_seed
      - symbol_certificates:/app/dest_certificates
    environment:
      - SYMBOL_NETWORK=${SYMBOL_NETWORK:-mainnet}
      - NODE_NAME=${NODE_NAME:-MyDokployNode}
      - DOMAIN_NAME=${DOMAIN_NAME}
      - MAIN_PRIVATE_KEY=${MAIN_PRIVATE_KEY}
      - VRF_PRIVATE_KEY=${VRF_PRIVATE_KEY}
      - REMOTE_PRIVATE_KEY=${REMOTE_PRIVATE_KEY}
      - VOTING_PRIVATE_KEY=${VOTING_PRIVATE_KEY}
    networks:
      - dokploy-network

  # 2. データベース本体（サービス名を db に変更して設定と一致させます）
  db:
    image: mongo:7.0.23
    command: mongod --replSet rs0 --bind_ip_all
    volumes:
      - mongodb_data:/data/db
    restart: always
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ping:1})", "--quiet"]
      interval: 3s
      timeout: 3s
      retries: 5

# 3. MongoDB レプリカセット初期化タスク
  mongo-init:
    image: mongo:7.0.23
    user: root
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - symbol_startup:/startup:ro
    networks:
      - dokploy-network
    command:
      - /bin/bash
      - -c
      - |
        echo "Waiting for db connection..."
        until mongosh --host db --eval "db.runCommand({ping:1})" --quiet; do
          sleep 1
        done
        
        echo "Initializing replica set..."
        mongosh --host db --eval "
          try {
            rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'db:27017' }] });
          } catch (e) {
            print('Replica set already initialized or skipped: ' + e.message);
          }
        " --quiet || true
        exit 0

  # 4. Symbol Broker
  broker:
    image: symbolplatform/symbol-server:gcc-1.0.3.9
    user: root
    depends_on:
      initializer:
        condition: service_completed_successfully
      mongo-init:
        condition: service_completed_successfully
    volumes:
      - symbol_startup:/startup:ro
      - symbol_userconfig:/userconfig:ro
      - symbol_seed:/seed:ro
      - symbol_certificates:/certificates:ro
      - symbol_data_broker:/data
    networks:
      - dokploy-network
    command: /bin/bash -c "umask 077 && mkdir -p /data/startup && touch /data/startup/datadir-initialized && rm -f /data/*.lock && exec /bin/bash /startup/startBroker.sh /userconfig"
    restart: always
    stop_signal: SIGINT

  # 5. Symbol ノード本体 (Peer)
  node:
    image: symbolplatform/symbol-server:gcc-1.0.3.9
    user: root
    depends_on:
      initializer:
        condition: service_completed_successfully
      broker:
        condition: service_started
    volumes:
      - symbol_startup:/startup:ro
      - symbol_userconfig:/userconfig:ro
      - symbol_seed:/seed:ro
      - symbol_certificates:/certificates:ro
      - symbol_data_node:/data
    ports:
      - "7900:7900"
    networks:
      - dokploy-network
    command: /bin/bash -c "umask 077 && mkdir -p /data/startup && touch /data/startup/mongo-initialized && rm -f /data/*.lock && exec /bin/bash /startup/startServer.sh /userconfig"
    restart: always
    stop_signal: SIGINT

  # 6. REST ゲートウェイ（API）
  rest-gateway:
    image: symbolplatform/symbol-rest:2.5.1
    user: root
    depends_on:
      initializer:
        condition: service_completed_successfully
      node:
        condition: service_started
    volumes:
      - symbol_startup:/startup:ro
      - symbol_userconfig:/userconfig:ro
    ports:
      - "3000:3000"
    networks:
      - dokploy-network
    command: /bin/bash /startup/delayrestapi.sh /userconfig
    restart: always

networks:
  dokploy-network:
    external: true

volumes:
  symbol_startup:
  symbol_userconfig:
  symbol_mongo:
  symbol_seed:
  symbol_certificates:
  symbol_data_broker:
  symbol_data_node:
  mongodb_data: