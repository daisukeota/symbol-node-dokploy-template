version: '3.8'

services:
  # 1. 初期化コンテナ
  initializer:
    build: ./initializer
    volumes:
      - symbol_startup_v5:/app/dest_startup
      - symbol_userconfig_v5:/app/dest_userconfig
      - symbol_mongo_v5:/app/dest_mongo
      - symbol_seed_v5:/app/dest_seed
    environment:
      - SYMBOL_NETWORK=${SYMBOL_NETWORK:-mainnet}
      - NODE_NAME=${NODE_NAME:-MyDokployNode}
      - DOMAIN_NAME=${DOMAIN_NAME}
      - MAIN_PRIVATE_KEY=${MAIN_PRIVATE_KEY}
      - VRF_PRIVATE_KEY=${VRF_PRIVATE_KEY}
      - REMOTE_PRIVATE_KEY=${REMOTE_PRIVATE_KEY}
      - VOTING_PRIVATE_KEY=${VOTING_PRIVATE_KEY}
    networks:
      - dokploy-network

  # 2. MongoDB
  mongo:
    image: mongo:7.0.23
    command: mongod --replSet rs0 --bind_ip_all
    volumes:
      - mongodb_data_v5:/data/db
    restart: always
    networks:
      - dokploy-network

  # 3. MongoDB レプリカセット初期化タスク
  mongo-init:
    image: mongo:7.0.23
    user: root
    entrypoint: ["/bin/bash", "-c"]
    depends_on:
      - mongo
    volumes:
      - symbol_startup_v5:/startup:ro
    network_mode: "service:mongo"
    command: "/bin/bash /startup/mongors.sh"

  # 4. Symbol Broker（承認エンジン）
  broker:
    image: symbolplatform/symbol-server:gcc-1.0.3.9
    user: root
    entrypoint: ["/bin/bash", "-c"]
    depends_on:
      - initializer
      - mongo
    volumes:
      - symbol_startup_v5:/startup:ro
      - symbol_userconfig_v5:/userconfig:ro
      - symbol_seed_v5:/seed:ro
      - symbol_data_v5:/data
    command: "/bin/bash /startup/startBroker.sh /userconfig"
    restart: always
    stop_signal: SIGINT
    networks:
      - dokploy-network

  # 5. Symbol ノード本体
  node:
    image: symbolplatform/symbol-server:gcc-1.0.3.9
    user: root
    entrypoint: ["/bin/bash", "-c"]
    depends_on:
      - initializer
      - broker
    volumes:
      - symbol_startup_v5:/startup:ro
      - symbol_userconfig_v5:/userconfig:ro
      - symbol_seed_v5:/seed:ro
      - symbol_data_v4:/data   # データボリュームは同期実績維持のため以前のものを継承、または新規なら v5 でも構いません
    ports:
      - "7900:7900"
    command: "/bin/bash /startup/startServer.sh /userconfig"
    restart: always
    stop_signal: SIGINT
    networks:
      - dokploy-network

  # 6. REST ゲートウェイ
  rest-gateway:
    image: symbolplatform/symbol-rest:2.5.1
    user: root
    entrypoint: ["/bin/bash", "-c"]
    depends_on:
      - node
      - mongo
    volumes:
      - symbol_startup_v5:/startup:ro
      - symbol_userconfig_v5:/userconfig:ro
    ports:
      - "3000:3000"
    command: "/bin/bash /startup/delayrestapi.sh /userconfig"
    restart: always
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true

# 👇【修正】漏れていた symbol_seed_v5 をしっかり定義しました！
volumes:
  symbol_startup_v5:
  symbol_userconfig_v5:
  symbol_mongo_v5:
  symbol_seed_v5:
  symbol_data_v4:
  mongodb_data_v5: