services:
  # 1. 初期化タスク
  initializer:
    image: neoflowjp-symbolnode-inx6g4-initializer:latest
    build: ./initializer
    volumes:
      - symbol_startup:/app/dest_startup
      - symbol_userconfig:/app/dest_userconfig
      - symbol_mongo:/app/dest_mongo
      - symbol_seed:/app/dest_seed
      - symbol_certificates:/app/dest_certificates
    environment:
      - SYMBOL_NETWORK=${SYMBOL_NETWORK:-mainnet}
      - NODE_NAME=${NODE_NAME:-MyDokployNode}
      - DOMAIN_NAME=${DOMAIN_NAME}
      - MAIN_PRIVATE_KEY=${MAIN_PRIVATE_KEY}
      - VRF_PRIVATE_KEY=${VRF_PRIVATE_KEY}
      - REMOTE_PRIVATE_KEY=${REMOTE_PRIVATE_KEY}
      - VOTING_PRIVATE_KEY=${VOTING_PRIVATE_KEY}
      - BENEFICIARY_ADDRESS=${BENEFICIARY_ADDRESS}
    networks:
      - dokploy-network

  # 2. データベース本体 (兼 全コンテナのネットワーク親玉)
  db:
    image: mongo:7.0.23
    hostname: db
    command: mongod --replSet rs0 --bind_ip_all
    volumes:
      - mongodb_data:/data/db
    ports:
      - "3000:3000"  # Dokployのドメイン(Traefik)からのAPIアクセスをここで受付
      - "7900:7900"  # 外部ノード（Peer）からのP2P通信をここで受付
    restart: always
    networks:
      - dokploy-network  # ドメインがここに紐付くため、Dokployの自動注入と100%調和します
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ping:1})", "--quiet"]
      interval: 3s
      timeout: 3s
      retries: 5

# 3. MongoDB レプリカセット初期化 + スキーマ適用
  mongo-init:
    image: mongo:7.0.23
    user: root
    depends_on:
      db:
        condition: service_healthy
    network_mode: "service:db"
    volumes:
      - symbol_mongo:/mongo:ro  # 👈 【追加】Shoestringが作ったDB初期化ファイルをマウント
    command:
      - /bin/bash
      - -c
      - |
        echo "Waiting for db connection..."
        until mongosh --eval "db.runCommand({ping:1})" --quiet; do
          sleep 1
        done
        echo "Initializing replica set..."
        mongosh --eval "
          try {
            rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'db:27017' }] });
          } catch (e) {
            print('Already initialized: ' + e.message);
          }
        " --quiet || true
        until mongosh --eval "db.hello().isWritablePrimary" --quiet | grep -q "true"; do
          sleep 1
        done
        
        # 👈 【追加】ここから下の4行でSymbol専用のテーブル構造とインデックスを適用します
        echo "Applying Symbol DB schemas and indexes..."
        if [ -f /mongo/mongoDbPrepare.js ]; then
          mongosh "mongodb://db:27017/catapult" < /mongo/mongoDbPrepare.js
          echo "Symbol DB preparation completed successfully."
        else
          echo "ERROR: /mongo/mongoDbPrepare.js not found!"
          exit 1
        fi
        exit 0

  # 4. Symbol Broker
  broker:
    image: symbolplatform/symbol-server:gcc-1.0.3.9
    user: root
    depends_on:
      initializer:
        condition: service_completed_successfully
      mongo-init:
        condition: service_completed_successfully
    volumes:
      - symbol_startup:/startup:ro
      - symbol_userconfig:/userconfig:ro
      - symbol_seed:/seed:ro
      - symbol_certificates:/certificates:ro
      - symbol_data_broker:/data
    network_mode: "service:db"
    command: /bin/bash -c "echo '127.0.0.1 db' >> /etc/hosts && umask 077 && mkdir -p /data/startup && touch /data/startup/datadir-initialized && rm -f /data/*.lock && exec /bin/bash /startup/startBroker.sh /userconfig"
    restart: always
    stop_signal: SIGINT

  # 5. Symbol ノード本体 (Peerサーバー)
  node:
    image: symbolplatform/symbol-server:gcc-1.0.3.9
    user: root
    depends_on:
      initializer:
        condition: service_completed_successfully
      broker:
        condition: service_started
    volumes:
      - symbol_startup:/startup:ro
      - symbol_userconfig:/userconfig:ro
      - symbol_seed:/seed:ro
      - symbol_certificates:/certificates:ro
      - symbol_data_node:/data
    network_mode: "service:db"
    command: /bin/bash -c "echo '127.0.0.1 db' >> /etc/hosts && umask 077 && mkdir -p /data/startup && touch /data/startup/mongo-initialized && rm -f /data/*.lock && exec /bin/bash /startup/startServer.sh /userconfig"
    restart: always
    stop_signal: SIGINT

  # 6. REST ゲートウェイ (API公開エンジン)
  rest-gateway:
    image: symbolplatform/symbol-rest:2.5.1
    user: root
    depends_on:
      initializer:
        condition: service_completed_successfully
      node:
        condition: service_started
    volumes:
      - symbol_startup:/startup:ro
      - symbol_userconfig:/userconfig:ro
      - symbol_certificates:/certificates:ro
    network_mode: "service:db"
    # 👇 本名であるドメイン名宛ての通信も、127.0.0.1（自分自身）に吸い込ませてSNIを完全一致させます
    command: /bin/bash -c "echo \"127.0.0.1 db client broker ${DOMAIN_NAME}\" >> /etc/hosts && exec npm start --prefix /app /userconfig/rest.json"
    restart: always

networks:
  dokploy-network:
    external: true

volumes:
  symbol_startup:
  symbol_userconfig:
  symbol_mongo:
  symbol_seed:
  symbol_certificates:
  symbol_data_broker:
  symbol_data_node:
  mongodb_data: